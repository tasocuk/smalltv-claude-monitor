; ============================================================================
;  GeekMagic SmallTV-Ultra  —  Özel PC İstatistik Firmware'i
;  Hedef donanım: ESP8266 / ESP-12F, 4 MB flash
;  Ekran: ST7789 240x240 IPS, donanım SPI (SCLK=GPIO14, MOSI=GPIO13)
; ============================================================================
[env:smalltv_ultra]
platform  = espressif8266
board     = esp12e
framework = arduino

; 160 MHz -> daha akıcı SPI/ekran
board_build.f_cpu       = 160000000L
board_build.filesystem  = littlefs
; 4 MB flash: 1 MB program (OTA) + 3 MB FS  -> resmi layout ile uyumlu, geri dönülebilir
board_build.ldscript    = eagle.flash.4m3m.ld

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  bblanchon/ArduinoJson @ ^7.2.0

build_flags =
  -O2
  ; ---------- TFT_eSPI: ST7789 240x240, GeekMagic SmallTV pin haritası ----------
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_CS=-1              ; CS GND'ye bağlı (her zaman seçili)
  -D TFT_DC=0              ; GPIO0
  -D TFT_RST=2            ; GPIO2
  ; SCLK=GPIO14, MOSI=GPIO13 ESP8266 donanım HSPI'de sabit -> ayrıca tanımlanmaz
  -D SPI_FREQUENCY=40000000
  ; ======================================================================
  ;  PANEL İNCE AYARLARI  —  ekranı göremediğim için ilk flash'ta kontrol:
  ;   1) Ekran KARANLIK kalırsa      -> BL_ACTIVE_LOW değerini 0 yap
  ;   2) Renkler NEGATİF görünürse   -> TFT_INVERSION_ON satırını sil
  ;   3) KIRMIZI/MAVİ yer değişmişse -> TFT_RGB_ORDER=TFT_BGR satırını aç
  ; ======================================================================
  -D BL_ACTIVE_LOW=1       ; arka ışık GPIO5 aktif-LOW (kaynak: açık firmware)
  -D TFT_INVERSION_ON=1    ; 240x240 IPS panel genelde inversion ister
  ; -D TFT_RGB_ORDER=TFT_BGR
  ; ---------- Fontlar ----------
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
